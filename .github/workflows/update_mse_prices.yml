name: Update MSE Prices

on:
  workflow_dispatch:
  schedule:
    # every 30 minutes Mon–Fri (UTC). Adjust later for Malawi trading hours if needed.
    - cron: "*/30 * * * 1-5"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/scraper/requirements.txt

      - name: Update stock prices (MSE mainboard)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python tools/scraper/mse_mainboard_scraper.py

      - name: Trigger price alerts -> notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python tools/scraper/trigger_price_alerts.py
