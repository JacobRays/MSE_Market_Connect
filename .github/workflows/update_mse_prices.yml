name: Update MSE Prices

on:
  workflow_dispatch:
  schedule:
    # Mon–Fri at 18:05 Malawi time (UTC+2) => 16:05 UTC
    - cron: "5 16 * * 1-5"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python tools/scraper/mse_mainboard_scraper.py
